<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Grazi 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --cor-principal: #ff4d6d; 
            --brilho-rosa: rgba(255, 77, 109, 0.6); 
            --cor-camaro: #ffd700; 
            --progresso-site: 0%; 
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0105;
            color: #fff; 
            height: 100vh; 
            overflow: hidden;
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: background 0.8s ease;
            perspective: 1000px;
        }

        /* Efeitos de Fundo */
        #fundo-dinamico {
            position: fixed;
            inset: -15%; 
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 77, 109, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 77, 109, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #1a0510 0%, #0a0105 100%);
            z-index: -1;
            transition: transform 0.2s ease-out;
            pointer-events: none;
        }

        .modo-camaro #fundo-dinamico {
            background: 
                radial-gradient(circle at 30% 20%, rgba(255, 215, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #1a1a00 0%, #050500 100%);
        }

        .barra-topo {
            position: fixed; top: 0; left: 0; height: 5px;
            width: var(--progresso-site);
            background: var(--cor-principal);
            box-shadow: 0 0 10px var(--cor-principal);
            z-index: 10000; transition: 0.4s ease;
        }
        .modo-camaro .barra-topo { background: var(--cor-camaro); box-shadow: 0 0 10px var(--cor-camaro); }

        /* Interface Principal */
        #btn-playlist {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 77, 109, 0.2); border: 2px solid var(--cor-principal);
            padding: 10px 20px; border-radius: 50px; color: #fff;
            text-decoration: none; display: none; align-items: center; gap: 10px;
            font-weight: bold; font-size: 13px;
            animation: flutuarBotao 2s infinite; transition: 0.3s;
        }
        @keyframes flutuarBotao { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .vinil { width: 20px; height: 20px; background: #111; border-radius: 50%; border: 3px double var(--cor-principal); animation: rodar 2s linear infinite; }
        @keyframes rodar { 100% { transform: rotate(360deg); } }

        .linhas-velocidade {
            position: fixed; inset: 0; pointer-events: none; opacity: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,215,0,0.1) 50%, transparent 100%);
            background-size: 400% 100%; z-index: 1;
        }
        .modo-camaro .linhas-velocidade { opacity: 1; animation: moverLinhas 0.2s linear infinite; }
        @keyframes moverLinhas { from { background-position: 100% 0; } to { background-position: 0% 0; } }

        /* Conteúdo dos Cards */
        .caixa-conteudo {
            background: rgba(15, 0, 5, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--cor-principal); border-radius: 30px;
            padding: 30px; width: 95%; max-width: 900px;
            display: none; grid-template-columns: 1fr 1.3fr; gap: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative; z-index: 10;
        }
        .caixa-conteudo.ativo { display: grid; animation: surgir 0.5s ease; }
        
        .modo-camaro .caixa-conteudo.ativo { 
            border-color: var(--cor-camaro); 
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2);
            animation: vibrar 0.3s ease-in-out; 
        }

        @media (max-width: 768px) {
            .caixa-conteudo { grid-template-columns: 1fr; max-height: 85vh; overflow-y: auto; padding: 20px; }
            .frame-media { height: 200px !important; }
            h2 { font-size: 30px !important; }
        }

        @keyframes vibrar {
            0% { transform: scale(1); }
            25% { transform: scale(1.01) rotate(0.5deg); }
            75% { transform: scale(0.99) rotate(-0.5deg); }
            100% { transform: scale(1); }
        }

        b, strong { color: var(--cor-principal); transition: 0.3s; }
        .modo-camaro b, .modo-camaro strong { color: var(--cor-camaro) !important; }

        .frame-media { border-radius: 15px; overflow: hidden; height: 350px; border: 1px solid var(--cor-principal); transition: 0.5s; }
        .modo-camaro .frame-media { border-color: var(--cor-camaro); }
        .frame-media img { width: 100%; height: 100%; object-fit: cover; }

        h2 { font-family: 'Dancing Script', cursive; color: var(--cor-principal); font-size: 45px; margin-bottom: 10px; }
        .modo-camaro h2 { color: var(--cor-camaro); text-shadow: 0 0 15px var(--cor-camaro); }
        
        .texto-principal { font-size: 17px; line-height: 1.6; color: #ffeef2; min-height: 160px; white-space: pre-line; }
        .efeito-digitar::after { content: '|'; animation: piscar 0.7s infinite; color: var(--cor-principal); }
        @keyframes piscar { 50% { opacity: 0; } }

        #box-contador {
            margin-top: 15px; font-size: 14px; color: var(--cor-principal);
            background: rgba(255, 77, 109, 0.1); padding: 12px; border-radius: 15px;
            border: 1px dashed var(--cor-principal); display: none; text-align: center;
        }
        .modo-camaro #box-contador { color: var(--cor-camaro); border-color: var(--cor-camaro); background: rgba(255, 215, 0, 0.05); }

        /* Botões e Navegação */
        .painel-botoes { position: fixed; bottom: 30px; display: flex; gap: 15px; z-index: 100; }
        .botao-acao { padding: 12px 30px; border-radius: 50px; border: none; cursor: pointer; font-weight: 800; background: var(--cor-principal); color: #fff; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        
        .btn-camaro-estilo {
            margin-top: 15px; background: #222; color: #fff;
            padding: 12px 20px; border-radius: 10px; font-weight: 900;
            border: 2px solid var(--cor-camaro); cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
        .camaro-ligado { background: var(--cor-camaro) !important; color: #000 !important; animation: tremer 0.1s infinite; }
        @keyframes tremer { 0% { transform: translateX(1px); } 100% { transform: translateX(-1px); } }

        /* Overlay de Entrada (Presente) */
        #tela-entrada { position: fixed; inset: 0; background: #0a0105; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s; }
        .embrulho { position: relative; width: 140px; height: 140px; cursor: pointer; animation: balanco 1.2s infinite; }
        .caixa-base { width: 100%; height: 100%; background: var(--cor-principal); border-radius: 10px; position: relative; box-shadow: 0 0 40px var(--brilho-rosa); }
        .caixa-base::after { content: ''; position: absolute; top: 0; left: 42%; width: 16%; height: 100%; background: #fff; }
        .caixa-base::before { content: ''; position: absolute; top: 42%; left: 0; width: 100%; height: 16%; background: #fff; }
        .caixa-tampa { position: absolute; top: -15px; left: -5%; width: 110%; height: 35px; background: var(--cor-principal); border-radius: 5px; z-index: 2; transition: 0.5s; }
        .caixa-tampa::after { content: ''; position: absolute; top: 0; left: 43%; width: 14%; height: 100%; background: #fff; }
        
        .aberto .caixa-tampa { transform: translateY(-100px) rotate(15deg); opacity: 0; }
        .aberto .caixa-base { transform: scale(0); opacity: 0; }

        #sleep-screen {
            position: fixed; inset: 0; background: #000; z-index: 20000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; transition: 1s; opacity: 0;
        }

        @keyframes balanco { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes surgir { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="meu-site">

    <div id="fundo-dinamico"></div>
    <div class="barra-topo"></div>
    <div class="linhas-velocidade"></div>
    <div id="camada-particulas" style="position: fixed; inset: 0; pointer-events: none; z-index: 2;"></div>

    <div id="sleep-screen">
        <h1 style="font-family: 'Dancing Script'; font-size: 40px;">Zzz...</h1>
        <p style="margin-top: 20px;">Dormiu que passou! 😴</p>
        <button onclick="voltarAoSite()" class="botao-acao" style="margin-top: 30px; background: none; border: 1px solid #fff;">Acordar</button>
    </div>

    <a href="#" target="_blank" id="btn-playlist">
        <div class="vinil"></div>
        <span>Nossa Playlist</span>
    </a>

    <div id="tela-entrada">
        <h1 style="font-family: 'Dancing Script'; font-size: 40px; color: var(--cor-principal); margin-bottom: 40px;">Para a Grazi... ✨</h1>
        <div class="embrulho" onclick="abrirPresente(this)">
            <div class="caixa-tampa"></div>
            <div class="caixa-base"></div>
        </div>
        <p style="margin-top: 30px; color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 2px;">TOQUE PARA ABRIR</p>
    </div>

    <div id="card-1" class="caixa-conteudo">
        <div class="frame-media"><img src="https://i.pinimg.com/originals/f0/ae/8b/f0ae8bc86ab9b5459880ea9e8894774d.gif"></div>
        <div><h2>Olá, Grazi 🌸</h2><div id="txt-1" class="texto-principal"></div></div>
    </div>
    
    <div id="card-2" class="caixa-conteudo">
        <div class="frame-media"><img src="https://i.pinimg.com/originals/5f/9d/40/5f9d4041c5b505d18842b2b47e9c8775.gif"></div>
        <div><h2>23 de Abril ✨</h2><div id="txt-2" class="texto-principal"></div><div id="box-contador"></div></div>
    </div>

    <div id="card-3" class="caixa-conteudo">
        <div class="frame-media"><img src="https://raw.githubusercontent.com/Dulkiey/agora-vai/main/nossoinicio.png"></div>
        <div><h2>Onde tudo começou 🎮</h2><div id="txt-3" class="texto-principal"></div></div>
    </div>

    <div id="card-4" class="caixa-conteudo">
        <div class="frame-media"><img src="https://i.pinimg.com/originals/16/2c/a1/162ca1d463e0d4c848fee9bd01d3042e.gif"></div>
        <div><h2>Nossa vibe... 🎶</h2><div id="txt-4" class="texto-principal"></div><button class="btn-camaro-estilo" id="disparar-vibe" onclick="ativarCamaro()">🏎️ ACIONAR VIBE CAMARO</button></div>
    </div>
    
    <div id="card-5" class="caixa-conteudo">
        <div class="frame-media"><img src="https://media.tenor.com/pOGPqDU93s0AAAAM/cat-phone-cat.gif"></div>
        <div><h2>Calls e Jogos... 🎧</h2><div id="txt-5" class="texto-principal"></div></div>
    </div>
    
    <div id="card-6" class="caixa-conteudo">
        <div class="frame-media"><img src="https://i.pinimg.com/originals/73/0d/75/730d75ed729397068c7a89fa7476e305.gif"></div>
        <div><h2>Especial ❤️</h2><div id="txt-6" class="texto-principal"></div></div>
    </div>
    
    <div id="card-7" class="caixa-conteudo">
        <div class="frame-media"><img src="https://i.pinimg.com/originals/e1/43/92/e14392b3bb9f745025a5cf6a9abe11be.gif"></div>
        <div><h2>Para você... 🌹</h2><div id="txt-7" class="texto-principal"></div></div>
    </div>
    
    <div id="card-8" class="caixa-conteudo">
        <div class="frame-media"><img src="https://i.pinimg.com/736x/f6/df/54/f6df54fc1a82fb6b1ac48cf6dbd1170b.jpg"></div>
        <div><h2>Feliz aniversário 🥳</h2><div id="txt-8" class="texto-principal"></div></div>
    </div>

    <div class="painel-botoes" id="controles-nav"></div>

    <audio id="player-musica" loop><source src="https://files.catbox.moe/qzyweo.mp3" type="audio/mpeg"></audio>
    <audio id="efeito-click"><source src="https://www.fesliyanstudios.com/play-mp3/6" type="audio/mpeg"></audio>

    <script>
        const textosSite = {
            1: `Olaaa, Grazi! Espero que o seu dia esteja sendo maravilhoso nesse seu aniversário. Eu espero que eu não tenha te tirado do sério até agora, ainda mais em um dia tão especial. Eu já devo ter te falado isso, essa foi a minha primeira experiencia criando um site… mesmo assim, espero de coração que você goste ❤️`,
            2: `Quem diria que, há 19 anos, nessa mesma data, nasceria algo tão pitico e maravilhoso... Mas agora falando sério: que o seu dia especial seja incrível, e que eu possa torná-lo ainda melhor com esse site. Fico muito feliz por comemorar essa data ao seu lado. \n\nVocê é uma pessoa com vários lados, e todos eles eu gosto muito. **Você é maravilhosa** e consegue deixar tudo ao redor mais leve e mais simples ❤️.`,
            3: `Eu fico muito feliz que eu tenha ido dormir tarde para jogar aquela partida de LoL e pude conhecer o **melhor duo** que poderia imaginar. Esse print foi o início de tudo, o momento em que a gente se conheceu!`,
            4: `Sempre que eu ver um Camaro Amarelo, eu vou me lembrar de você cantando essa música baixinho na ligação. Você deixa tudo mais leve.`,
            5: `Eu amo o fato de que a gente pode passar horas conversando sobre tudo e sobre nada ao mesmo tempo. Jogar com você é o meu passatempo favorito, e eu não trocaria nossas madrugadas em call por nada nesse mundo (mesmo você me trocando por um salgado e um refresco 😓).`,
            6: `Sua inteligência, seu senso de humor e o seu jeito único de ser me encantam todos os dias. Todos os momentos que a gente tem junto eu vejo como eu sou sortudo **por ter você na minha vida.**`,
            7: `Eu nunca tinha feito nada parecido, mas por você eu quis aprender. Todo o esforço e os dias que passei aprendendo a criar este site valeram a pena. Esse é o meu presente 'feito à mão', e espero que você sinta, em cada detalhe, o carinho enorme que coloquei aqui.`,
            8: `E, por fim, eu agradeço muito por você me aturar todos os dias. Eu fiz isso mais como uma forma de agradecimento por você ser como é: uma pessoa amiga, parceira e um amor de pessoa. Eu espero que eu possa estar nos próximos aniversários contigo. E se você não gostou, **dorme que passa!** Mais uma vez, feliz aniversário e que você conquiste tudo de bom na sua vida. Sempre irei torcer por você. **Te amo! <3**`
        };

        // Movimento suave do fundo
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / 40;
            const y = (e.clientY - window.innerHeight / 2) / 40;
            document.getElementById('fundo-dinamico').style.transform = `translate(${x}px, ${y}px)`;
        });

        function playSom() {
            const s = document.getElementById('efeito-click');
            s.volume = 0.2; s.currentTime = 0; s.play().catch(()=>{});
        }

        function abrirPresente(el) {
            playSom();
            el.parentElement.classList.add('aberto');
            setTimeout(() => {
                document.getElementById('player-musica').play();
                document.getElementById('tela-entrada').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('tela-entrada').style.display = 'none';
                    document.getElementById('btn-playlist').style.display = 'flex';
                    mudarPagina(1);
                }, 1000);
            }, 600);
        }

        function ativarCamaro() {
            playSom();
            const b = document.getElementById('meu-site');
            const btn = document.getElementById('disparar-vibe');
            const music = document.getElementById('player-musica');
            b.classList.toggle('modo-camaro');
            if(b.classList.contains('modo-camaro')) {
                btn.innerText = "DOCE IGUAL CARAMELO! 🏎️💨";
                btn.classList.add('camaro-ligado'); music.currentTime = 66; 
            } else {
                btn.innerText = "🏎️ ACIONAR VIBE CAMARO";
                btn.classList.remove('camaro-ligado'); music.currentTime = 0; 
            }
        }

        function acaoDormir() {
            playSom();
            const s = document.getElementById('sleep-screen');
            s.style.display = 'flex';
            setTimeout(() => s.style.opacity = '1', 50);
        }

        function voltarAoSite() {
            const s = document.getElementById('sleep-screen');
            s.style.opacity = '0';
            setTimeout(() => s.style.display = 'none', 1000);
        }

        let typingIdx;
        function mudarPagina(n) {
            playSom();
            clearInterval(typingIdx);
            document.documentElement.style.setProperty('--progresso-site', `${(n/8)*100}%`);
            document.querySelectorAll('.caixa-conteudo').forEach(c => c.classList.remove('ativo'));
            document.getElementById('card-' + n).classList.add('ativo');
            
            if(n === 2) {
                const diff = Math.floor((new Date() - new Date('2025-12-27')) / 86400000);
                const cont = document.getElementById('box-contador');
                cont.style.display = 'block';
                cont.innerHTML = `✨ Já são **${diff} dias** de muito ódio e amor envolvido!`;
            }

            const menu = document.getElementById('controles-nav'); menu.innerHTML = '';
            if(n > 1) {
                const v = document.createElement('button'); v.className = 'botao-acao';
                v.style.background = '#333'; v.innerText = 'Voltar'; v.onclick = () => mudarPagina(n-1); menu.appendChild(v);
            }
            const p = document.createElement('button'); p.className = 'botao-acao';
            p.innerText = n === 8 ? 'TE AMO ❤️' : 'Continuar';
            p.onclick = n === 8 ? explosaoCoracoes : () => mudarPagina(n+1);
            menu.appendChild(p);

            let char = 0; const box = document.getElementById('txt-' + n); box.innerHTML = "";
            box.classList.add('efeito-digitar');
            typingIdx = setInterval(() => {
                if(char <= textosSite[n].length) {
                    let raw = textosSite[n].substring(0, char).replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                    if(n === 8) raw = raw.replace("dorme que passa!", "<span style='cursor:pointer;text-decoration:underline' onclick='acaoDormir()'>dorme que passa!</span>");
                    box.innerHTML = raw; char++;
                } else { clearInterval(typingIdx); box.classList.remove('efeito-digitar'); }
            }, 20);
        }

        function explosaoCoracoes() {
            for(let i=0; i<60; i++) {
                const el = document.createElement('div');
                el.innerHTML = i % 2 === 0 ? "❤️" : "GRAZI";
                el.style.cssText = `position:fixed; left:50%; top:50%; pointer-events:none; z-index:9999; font-weight:bold; color:${i%2===0?'#ff4d6d':'#fff'}`;
                const ang = Math.random() * Math.PI * 2;
                const dist = Math.random() * 800 + 400;
                el.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px) scale(0) rotate(360deg)`, opacity: 0 }
                ], { duration: 2000, fill: 'forwards' });
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2000);
            }
        }

        // Partículas de fundo
        const partLayer = document.getElementById('camada-particulas');
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.style.cssText = `position:absolute; width:3px; height:3px; background:#fff; border-radius:50%; opacity:0.3; left:${Math.random()*100}%; top:${Math.random()*100}%`;
            p.animate([{ transform: 'translateY(0)' }, { transform: 'translateY(-40px)' }], { duration: Math.random()*3000 + 2000, iterations: Infinity, direction: 'alternate' });
            partLayer.appendChild(p);
        }
    </script>
</body>
</html>
